name: CI

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Syntax check
        run: python -m compileall backend run.py scripts tests
      - name: Import smoke
        run: PYTHONPATH=backend python -c "import qtlift.api, qtlift.pipeline; print('qtlift import ok')"
